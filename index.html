  var g = document.getElementById('evenements-grid');
  if (!evenements.length) { g.innerHTML = '<div style="grid-column:1/-1;padding:4rem 0;text-align:center"><span style="font-family:\'Oswald\',sans-serif;font-size:0.6rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--border)">Photos Ã  venir</span></div>'; return; }
  g.innerHTML = evenements.map((p,i) => `<div class="gallery-item" onclick="openLightbox(${i},'evenements')"><img src="${p.src}" alt="${labelFromSrc(p.src,p.label)}" loading="lazy"><div class="gallery-item-overlay"><span class="gallery-label">${labelFromSrc(p.src,p.label)}</span></div></div>`).join('');
}
renderPhotos(); renderVideos(); renderEvenements();
const sections = ['photos','videos','evenements','contact'];
function toggleMobileMenu() { var b=document.getElementById('nav-hamburger'),m=document.getElementById('nav-mobile-menu'); b.classList.toggle('open'); m.classList.toggle('open'); }
function closeMobileMenu() { document.getElementById('nav-hamburger').classList.remove('open'); document.getElementById('nav-mobile-menu').classList.remove('open'); }
function showSection(id) {
  sections.forEach(s => {
    var sec=document.getElementById(s), tab=document.getElementById('tab-'+s), mob=document.getElementById('mob-tab-'+s);
    if (s===id) { sec.classList.remove('hidden'); tab.classList.add('active'); if(mob)mob.classList.add('active'); sec.querySelectorAll('.reveal').forEach((el,i)=>setTimeout(()=>el.classList.add('visible'),i*60)); }
    else { sec.classList.add('hidden'); tab.classList.remove('active'); if(mob)mob.classList.remove('active'); }
  });
  window.scrollTo({top:0,behavior:'smooth'});
}
document.getElementById('tab-photos').classList.add('active');
document.getElementById('mob-tab-photos').classList.add('active');
document.querySelectorAll('#photos .reveal').forEach((el,i)=>setTimeout(()=>el.classList.add('visible'),100+i*60));
let lbIdx=0, activeGal=photos;
function lbl2(src,fb) { if(fb)return fb; return src.split('/').pop().replace(/\.[^.]+$/,'').replace(/[-_]+/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); }
function updateCtr() { document.getElementById('lightbox-counter').textContent=(lbIdx+1)+' / '+activeGal.length; }
function preload(i) { [(i-1+activeGal.length)%activeGal.length,(i+1)%activeGal.length].forEach(j=>{var x=new Image();x.src=activeGal[j].src;}); }
function openLightbox(i,type) { activeGal=(type==='evenements')?evenements:photos; lbIdx=i; var p=activeGal[i],img=document.getElementById('lightbox-img'); img.src=p.src; document.getElementById('lightbox-caption').textContent=lbl2(p.src,p.label); updateCtr(); preload(i); document.getElementById('lightbox').classList.add('active'); document.body.style.overflow='hidden'; }
function lightboxNav(d) { var img=document.getElementById('lightbox-img'),wrap=img.parentElement; lbIdx=(lbIdx+d+activeGal.length)%activeGal.length; var p=activeGal[lbIdx]; img.src=p.src; document.getElementById('lightbox-caption').textContent=lbl2(p.src,p.label); updateCtr(); preload(lbIdx); wrap.style.transition='none'; wrap.style.transform=''; wrap.style.opacity=''; }
function lightboxClickNav(e) { lightboxNav(e.offsetX<e.currentTarget.offsetWidth/2?-1:1); }
function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); document.body.style.overflow=''; }
function openVideoLightbox(id,item) { if(!id||id.startsWith('LIEN_'))return; var ip=item.classList.contains('portrait'),inn=document.getElementById('vlb-inner'),rat=document.getElementById('vlb-ratio'),ifr=document.getElementById('vlb-iframe'); inn.className='video-lightbox-inner'+(ip?' portrait':''); rat.className='video-lightbox-ratio'+(ip?' portrait':''); ifr.src='https://www.youtube.com/embed/'+id+'?autoplay=1&rel=0&playsinline=1'; document.getElementById('video-lightbox').classList.add('active'); document.body.style.overflow='hidden'; }
function closeVideoLightbox() { document.getElementById('video-lightbox').classList.remove('active'); document.getElementById('vlb-iframe').src=''; document.body.style.overflow=''; }
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){closeLightbox();closeVideoLightbox();} if(e.key==='ArrowRight')lightboxNav(1); if(e.key==='ArrowLeft')lightboxNav(-1); });
var lbW=document.getElementById('lightbox-img').parentElement,tSX=0,tSY=0,swA=null;
document.getElementById('lightbox').addEventListener('touchstart',e=>{tSX=e.touches[0].clientX;tSY=e.touches[0].clientY;swA=null;lbW.style.transition='none';},{passive:true});
document.getElementById('lightbox').addEventListener('touchmove',e=>{
  var dx=e.touches[0].clientX-tSX,dy=e.touches[0].clientY-tSY;
  if(!swA&&(Math.abs(dx)>8||Math.abs(dy)>8))swA=Math.abs(dx)>Math.abs(dy)?'x':'y';
  if(swA==='x'){lbW.style.transform=`translateX(${dx}px)`;lbW.style.opacity=String(Math.max(0.3,1-Math.abs(dx)/(window.innerWidth*0.8)));}
  else if(swA==='y'){lbW.style.transform=`translateY(${dy*0.4}px)`;lbW.style.opacity=String(Math.max(0.3,1-Math.abs(dy)/300));}
},{passive:true});
document.getElementById('lightbox').addEventListener('touchend',e=>{
  var dx=e.changedTouches[0].clientX-tSX,dy=e.changedTouches[0].clientY-tSY;
  lbW.style.transition='';
  if(swA==='x'&&Math.abs(dx)>60)lightboxNav(dx<0?1:-1);
  else if(swA==='y'&&Math.abs(dy)>80)closeLightbox();
  else{lbW.style.transform='';lbW.style.opacity='';}
},{passive:true});
</script>
</body>
</html>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f8f8f6;
      --text: #111110; --muted: #999995;
      --border: #e8e8e4; --hover: #f2f2ef;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-weight: 300; overflow-x: hidden; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 0 3rem; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif; font-weight: 400;
      font-size: 1.6rem; letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--text); text-decoration: none;
    }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a {
      font-family: 'Oswald', sans-serif; font-weight: 300;
      font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted); text-decoration: none; cursor: pointer;
      transition: color 0.3s; padding-bottom: 2px;
      border-bottom: 1px solid transparent;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--text); border-bottom-color: var(--text); }

    /* SECTIONS */
    section { padding: 1rem 3rem 3rem; margin-top: 64px; }
    section.hidden { display: none; }

    /* SECTION HEADER */
    .section-header {
      display: flex; align-items: baseline; gap: 1.5rem;
      margin-bottom: 2rem; padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .section-title {
      font-family: 'Oswald', sans-serif; font-weight: 500;
      font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--text);
    }
    .section-num { font-family: 'Lora', serif; font-style: italic; font-size: 0.75rem; color: var(--muted); }

    /* GALERIE PHOTOS */
    .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
    .gallery-item { position: relative; cursor: pointer; overflow: hidden; }
    .gallery-item img { width: 100%; height: auto; display: block; transition: transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94); }
    .gallery-item:hover img { transform: scale(1.05); }
    .gallery-item img { -webkit-user-drag: none; user-drag: none; }
    .gallery-item-overlay {
      position: absolute; inset: 0; z-index: 2;
      background: linear-gradient(to top, rgba(0,0,0,0) 0%, rgba(0,0,0,0) 100%);
      transition: background 0.4s; display: flex; align-items: flex-end; padding: 1rem;
      user-select: none; -webkit-user-select: none;
    }
    .gallery-item:hover .gallery-item-overlay {
      background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.18) 55%, rgba(0,0,0,0) 100%);
    }

    .gallery-label {
      font-family: 'Oswald', sans-serif; font-weight: 400;
      font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: #fff; opacity: 0; transform: translateY(6px); transition: all 0.3s;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }
    .gallery-item:hover .gallery-label { opacity: 1; transform: translateY(0); }

    /* placeholder */
    .ph {
      width: 100%; background: var(--bg2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
    }
    .ph-text {
      font-family: 'Oswald', sans-serif; font-weight: 300;
      font-size: 0.5rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--border);
    }

    /* VIDÉOS */
    #videos { background: var(--bg); }
    .video-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
    .video-item { break-inside: avoid; margin-bottom: 5px; position: relative; overflow: hidden; cursor: pointer; width: 100%; }
    .video-item.portrait { aspect-ratio: 9/16; }
    .video-item.landscape { aspect-ratio: 16/9; }
    .video-item.portrait .video-inner,
    .video-item.landscape .video-inner { position: absolute; inset: 0; }
    @media (max-width: 900px) { .video-grid { columns: 2; } }
    @media (max-width: 600px) { .video-grid { columns: 2; } }
    .video-item:hover .video-play { background: var(--text); }
    .video-item:hover .video-play svg { fill: #fff; }
    .video-inner {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
      background: var(--bg2); transition: background 0.3s;
    }
    .video-item:hover .video-inner { background: var(--hover); }
    .video-play {
      width: 44px; height: 44px; border: 1px solid var(--text);
      display: flex; align-items: center; justify-content: center; transition: background 0.3s;
    }
    .video-play svg { fill: var(--text); margin-left: 3px; transition: fill 0.3s; }
    .video-label {
      font-family: 'Oswald', sans-serif; font-weight: 300;
      font-size: 0.55rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted); text-align: center; padding: 0 0.8rem;
    }

    /* CONTACT */
    .contact-inner { max-width: 100%; }
    .contact-hero {
      position: relative; width: 100%; min-height: 360px;
      margin-bottom: 0; overflow: hidden;
      display: flex; align-items: flex-end; padding: 2.5rem;
      background: var(--bg2);
    }
    .contact-hero-bg {
      position: absolute; inset: 0;
      background-image: url('contact-bg.jpg');
      background-size: cover; background-position: top;
      transition: transform 0.8s ease;
    }
    .contact-hero:hover .contact-hero-bg { transform: scale(1.02); }
    .contact-hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.15) 50%, transparent 100%);
    }
    .contact-tagline {
      position: relative; z-index: 2;
      font-family: 'Oswald', sans-serif; font-style: normal; font-weight: 400;
      font-size: clamp(1.6rem, 3vw, 2.4rem); letter-spacing: 0.04em;
      text-transform: uppercase; color: #fff; line-height: 1.2;
    }
    @media (max-width: 600px) { .contact-hero { min-height: 240px; padding: 1.5rem; } }
    .contact-simple { display: flex; flex-direction: column; margin-top: 2.5rem; }
    .contact-simple-link {
      display: flex; flex-direction: column; gap: 0.3rem;
      padding: 1.4rem 0; border-bottom: 1px solid var(--border);
      text-decoration: none; transition: padding-left 0.3s;

    .contact-simple-link:first-child { border-top: 1px solid var(--border); }
    .contact-simple-link:hover { padding-left: 0.5rem; }
    .contact-simple-link .c-label {
      font-family: 'Oswald', sans-serif; font-weight: 300;
      font-size: 0.55rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--muted);
    }
    .contact-simple-link .c-val {
      font-family: 'Inter', sans-serif; font-weight: 300;
      font-size: 1rem; color: var(--text);
    }
    .contact-simple-link:hover .c-val { color: var(--text); }

    /* CONTACT ICONS */
    .contact-email {
      font-family: 'Inter', sans-serif; font-weight: 300;
      font-size: 1rem; color: var(--text);
      margin-bottom: 2.5rem; letter-spacing: 0.02em;
    }
    .contact-row {
      padding: 1rem 0; border-bottom: 1px solid var(--border); margin-top: 1rem;
    }
    .contact-row .c-label {
      font-family: 'Oswald', sans-serif; font-weight: 300;
      font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted);
      min-width: 90px;
    }
    .contact-row .c-val {
      font-family: 'Inter', sans-serif; font-weight: 300; font-size: 0.85rem; color: var(--text);
    }
    .contact-divider { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    .contact-icons { display: flex; gap: 1.8rem; margin-top: 1.2rem; justify-content: center; }
    .contact-icon { color: var(--muted); transition: color 0.3s, transform 0.3s; display: flex; }
    .contact-icon:hover { color: var(--text); transform: translateY(-2px); }

    /* FOOTER */
    footer {
      padding: 1.8rem 3rem; border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    footer span {
      font-family: 'Oswald', sans-serif; font-weight: 300;
      font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted);
    }

    /* LIGHTBOX */
    .lightbox {
      position: fixed; inset: 0; background: rgba(255,255,255,0.97);
      z-index: 500; display: none; align-items: center; justify-content: center;
      flex-direction: row; touch-action: none;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90vw; max-height: 90vh; object-fit: contain;
      display: block;
    }
    .lightbox-img-wrap.swipe-down { transform: translateY(120px); opacity: 0; }
    .lightbox-img-wrap.slide-out-left  { transform: translateX(-80px); opacity: 0; }
    .lightbox-img-wrap.slide-out-right { transform: translateX(80px);  opacity: 0; }
    .lightbox-img-wrap.slide-in-left   { transform: translateX(80px);  opacity: 0; }
    .lightbox-img-wrap.slide-in-right  { transform: translateX(-80px); opacity: 0; }
    .lightbox-img-wrap {
      position: relative;
      display: inline-flex;
      max-width: 90vw;
      max-height: 90vh;
      transition: transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.3s ease;
      will-change: transform, opacity;
    }
    .lightbox-img-wrap img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      transition: none;
    }
    .lightbox-img-wrap img.loading { filter: blur(8px); }

    .lightbox-caption {
      position: absolute;
      bottom: 12px;
      left: 14px;
      font-family: 'Oswald', sans-serif;
      font-weight: 300;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #fff;
      pointer-events: none;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
    .lightbox-counter {
      position: absolute; top: 1.5rem; left: 2rem;
      font-family: 'Oswald', sans-serif; font-weight: 300;
      font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted);
    }
    .lightbox-close {
      position: absolute; top: 1.5rem; right: 2rem;
      background: none; border: none; font-family: 'Oswald', sans-serif;
      font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--muted); cursor: pointer; transition: color 0.3s;
    }
    .lightbox-close:hover { color: var(--text); }

    /* VIDEO LIGHTBOX */
    .video-lightbox {
      display: none; position: fixed; inset: 0; z-index: 600;
      background: rgba(0,0,0,0.92); align-items: center; justify-content: center;
    }
    .video-lightbox.active { display: flex; }
    .video-lightbox-close {
      position: absolute; top: 1.5rem; right: 2rem;
      background: none; border: none; color: rgba(255,255,255,0.6);
      font-size: 1.2rem; cursor: pointer; z-index: 2; transition: color 0.2s;
    }
    .video-lightbox-close:hover { color: #fff; }
    .video-lightbox-inner {
      position: relative; width: 90vw; max-width: 860px;
    }
    .video-lightbox-inner.portrait {
      width: min(calc(85vh * 9 / 16), 90vw);
      max-width: 420px;
    }
    .video-lightbox-ratio {
      position: relative; width: 100%; padding-bottom: 56.25%;
    }
    .video-lightbox-ratio.portrait { padding-bottom: 177.78%; }
    .video-lightbox-ratio iframe {
      position: absolute; inset: 0; width: 100%; height: 100%;
      border: none;
    }

    /* REVEAL */
    .reveal { opacity: 0; transform: translateY(16px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* SETUP BANNER */
    .setup-banner {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 0.7rem 3rem; font-family: 'Oswald', sans-serif; font-weight: 300;
      font-size: 0.55rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--muted); text-align: center;
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      nav { padding: 0 1.5rem; }
      section { padding: 0.8rem 1.5rem 2.5rem; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 4px; }
      footer { padding: 1.5rem; }
    }
    @media (max-width: 600px) {
      nav { padding: 0 1rem; height: 56px; }
      .nav-logo { font-size: 1.1rem; }
      .nav-links { display: none; }
      section { padding: 0.5rem 1rem 2rem; margin-top: 56px; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 3px; }
      .gallery-label { font-size: 0.38rem; letter-spacing: 0.12em; }
      .video-grid { columns: 1; }
      footer { padding: 1.2rem 1rem; flex-direction: column; gap: 0.5rem; text-align: center; }
    }
    /* HAMBURGER */
    .nav-hamburger {
      display: none; flex-direction: column; justify-content: center;
      gap: 5px; width: 32px; height: 32px; cursor: pointer;
      background: none; border: none; padding: 0; flex-shrink: 0;
    }
    .nav-hamburger span {
      display: block; width: 22px; height: 1.5px;
      background: var(--text); transition: all 0.25s ease;
    }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
    .nav-mobile-menu {
      display: none; position: fixed; top: 56px; left: 0; right: 0;
      background: var(--bg); border-bottom: 1px solid var(--border);
      z-index: 199;
    }
    .nav-mobile-menu.open { display: block; }
    .nav-mobile-menu li { list-style: none; border-bottom: 1px solid var(--border); }
    .nav-mobile-menu li:last-child { border-bottom: none; }
    .nav-mobile-menu a {
      display: block; padding: 1rem 1.5rem;
      font-family: 'Oswald', sans-serif; font-weight: 300;
      font-size: 0.72rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--muted); text-decoration: none; cursor: pointer;
      transition: color 0.2s, padding-left 0.2s;
    }
    .nav-mobile-menu a:hover { color: var(--text); padding-left: 2rem; }
    .nav-mobile-menu a.active { color: var(--text); }
    @media (max-width: 600px) { .nav-hamburger { display: flex; } }
  </style>

    // ════════════════════════════════════════
    // POUR AJOUTER UNE VIDÉO :
    // format: "portrait" (9:16) ou "landscape" (16:9)
    // id: l'ID YouTube (ex: "dQw4w9WgXcQ")
    // exemple : { id: "dQw4w9WgXcQ", format: "portrait", label: "Mon titre" }
    // ════════════════════════════════════════
    const videos = [

    // ════════════════════════════════════════
    // POUR AJOUTER UNE PHOTO D'ÉVÉNEMENT :
    // Les photos événements vont dans le dossier evenements/ sur GitHub
    // Le chemin commence toujours par "evenements/"
    // exemple : { src: "evenements/concert-nom.avif", label: "Nom Concert" }
    // ════════════════════════════════════════
    const evenements = [
  { src: "evenements/IMG20251031234943 - Publication Instagram.avif", label: "SONORA OCTOBRE 25" },
  { src: "evenements/IMG20251101001104 - Publication Instagram-3.avif", label: "SONORA OCTOBRE 25" },
  { src: "evenements/IMG20251101024027 - Publication Instagram.avif", label: "SONORA OCTOBRE 25" },
  { src: "evenements/IMG20251101024139 - Publication Instagram.avif", label: "SONORA OCTOBRE 25" },
  { src: "evenements/IMG20251102013843 - Publication Instagram.avif", label: "SONORA OCTOBRE 25" },
  { src: "evenements/IMG20251031234917 - Publication Instagram.avif", label: "SONORA OCTOBRE 25" },
  { src: "evenements/IMG20251031232305_01 - Publication Instagram.avif", label: "SONORA OCTOBRE 25" },
  { src: "evenements/IMG20251031231621 - Publication Instagram.avif", label: "SONORA OCTOBRE 25" },
  { src: "evenements/IMG20250614025843-Avec accentuation-SR-Site Web AVIF 4x3-2.avif", label: "MADAME LOYAL X SONORA 25" },
  { src: "evenements/IMG20250614034357-Avec accentuation-SR-Site Web AVIF 4x3-2.avif", label: "MADAME LOYAL X SONORA 25" },
  { src: "evenements/IMG20250614034132-Avec accentuation-SR.avif", label: "MADAME LOYAL X SONORA 25" },
  { src: "evenements/IMG20250614030049-Avec accentuation-SR.avif", label: "MADAME LOYAL X SONORA 25" }
];

    // ─── Génère label depuis nom de fichier si absent ───
    function labelFromSrc(src, fallback) {
      if (fallback) return fallback;
      const name = src.split('/').pop().replace(/\.[^.]+$/, '');
      return name.replace(/[-_]+/g, ' ').replace(/\w/g, c => c.toUpperCase());
    }

    // ─── Rendu galerie photos ───
    function renderPhotos() {
      const grid = document.getElementById('gallery-grid');
      grid.innerHTML = photos.map((p, i) => {
        const label = labelFromSrc(p.src, p.label);
        return `<div class="gallery-item" onclick="openLightbox(${i})">
          <img src="${p.src}" alt="${label}" loading="lazy">
          <div class="gallery-item-overlay"><span class="gallery-label">${label}</span></div>
        </div>`;
      }).join('');
    }

    // ─── Rendu galerie vidéos ───
    function renderVideos() {
      const grid = document.getElementById('video-grid');
      if (videos.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1;padding:4rem 0;text-align:center;">
          <span style="font-family:'Oswald',sans-serif;font-weight:300;font-size:0.6rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--border);">Vidéo à venir</span>
        </div>`;
        return;
      }
      grid.innerHTML = videos.map((v, i) => {
        const isPortrait = v.format === 'portrait';
        return `<div class="video-item ${isPortrait ? 'portrait' : 'landscape'}" onclick="openVideoLightbox('${v.id}', this)">
          <div class="video-inner">
            <div class="video-play">
              <svg width="14" height="14" viewBox="0 0 14 14"><polygon points="3,1 13,7 3,13"/></svg>
            </div>
            <span class="video-label">${v.label || ''}</span>
          </div>
        </div>`;
      }).join('');
    }

    
    function renderEvenements() {
      const grid = document.getElementById('evenements-grid');
      if (evenements.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1;padding:4rem 0;text-align:center;">
          <span style="font-family:'Oswald',sans-serif;font-weight:300;font-size:0.6rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--border);">Photos à venir</span>
        </div>`;
        return;
      }
      grid.innerHTML = evenements.map((p, i) => {
        const label = labelFromSrc(p.src, p.label);
        return `<div class="gallery-item" onclick="openLightbox(${i}, 'evenements')">
          <img src="${p.src}" alt="${label}" loading="lazy">
          <div class="gallery-item-overlay"><span class="gallery-label">${label}</span></div>
        </div>`;
      }).join('');
    }

    renderPhotos();
    renderVideos();
    renderEvenements();

    const sections = ['photos','videos','evenements','contact'];

    function toggleMobileMenu() {
      const btn = document.getElementById('nav-hamburger');
      const menu = document.getElementById('nav-mobile-menu');
      btn.classList.toggle('open');
      menu.classList.toggle('open');
    }

    function closeMobileMenu() {
      document.getElementById('nav-hamburger').classList.remove('open');
      document.getElementById('nav-mobile-menu').classList.remove('open');
    }

    function showSection(id) {
      sections.forEach(s => {
        const sec = document.getElementById(s);
        const tab = document.getElementById('tab-' + s);
        const mobTab = document.getElementById('mob-tab-' + s);
        if (s === id) {
          sec.classList.remove('hidden');
          tab.classList.add('active');
          if (mobTab) mobTab.classList.add('active');
          sec.querySelectorAll('.reveal').forEach((el, i) => {
            setTimeout(() => el.classList.add('visible'), i * 60);
          });
        } else {
          sec.classList.add('hidden');
          tab.classList.remove('active');
          if (mobTab) mobTab.classList.remove('active');
        }
      });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // init — onglet Photos actif au chargement
    document.getElementById('tab-photos').classList.add('active');
    document.getElementById('mob-tab-photos').classList.add('active');
    document.querySelectorAll('#photos .reveal').forEach((el, i) => {
      setTimeout(() => el.classList.add('visible'), 100 + i * 60);
    });

    let lightboxItems = [];
    let lightboxIndex = 0;
    let activeGallery = photos; // tracks which array is open in lightbox

    function labelFromSrc2(src, fallback) {
      if (fallback) return fallback;
      const name = src.split('/').pop().replace(/\.[^.]+$/, '');
      return name.replace(/[-_]+/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    function updateCounter() {
      document.getElementById('lightbox-counter').textContent =
        (lightboxIndex + 1) + ' / ' + activeGallery.length;
    }

    function preload(index) {
      const prev = (index - 1 + activeGallery.length) % activeGallery.length;
      const next = (index + 1) % activeGallery.length;
      [prev, next].forEach(i => { const img = new Image(); img.src = activeGallery[i].src; });
    }

    function openLightbox(index, type) {
      activeGallery = (type === 'evenements') ? evenements : photos;
      lightboxIndex = index;
      const p = activeGallery[index];
      const lbImg = document.getElementById('lightbox-img');
      
      lbImg.src = p.src;
      
      document.getElementById('lightbox-caption').textContent = labelFromSrc2(p.src, p.label);
      updateCounter();
      preload(index);
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function lightboxNav(dir) {
      const lbImg  = document.getElementById('lightbox-img');
      const lbWrap = lbImg.parentElement;
      lightboxIndex = (lightboxIndex + dir + activeGallery.length) % activeGallery.length;
      const cp = activeGallery[lightboxIndex];
      lbImg.src = cp.src;
      document.getElementById('lightbox-caption').textContent = labelFromSrc2(cp.src, cp.label);
      updateCounter();
      preload(lightboxIndex);
      lbWrap.style.transition = 'none';
      lbWrap.style.transform = '';
      lbWrap.style.opacity = '';
    }

    function lightboxClickNav(e) {
      const half = e.currentTarget.offsetWidth / 2;
      lightboxNav(e.offsetX < half ? -1 : 1);
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = '';
    }

    function openVideoLightbox(youtubeId, item) {
      if (!youtubeId || youtubeId.startsWith('LIEN_')) return;
      const isPortrait = item.classList.contains('portrait');
      const inner = document.getElementById('vlb-inner');
      const ratio = document.getElementById('vlb-ratio');
      const iframe = document.getElementById('vlb-iframe');
      inner.className = 'video-lightbox-inner' + (isPortrait ? ' portrait' : '');
      ratio.className = 'video-lightbox-ratio' + (isPortrait ? ' portrait' : '');
      iframe.src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1&rel=0&playsinline=1`;
      document.getElementById('video-lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeVideoLightbox() {
      document.getElementById('video-lightbox').classList.remove('active');
      document.getElementById('vlb-iframe').src = '';
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeLightbox(); closeVideoLightbox(); }
      if (e.key === 'ArrowRight') lightboxNav(1);
      if (e.key === 'ArrowLeft') lightboxNav(-1);
    });

    // ─── Touch / Swipe ───
    const lbWrapEl = document.getElementById('lightbox-img').parentElement;
    let touchStartX = 0, touchStartY = 0;
    let swipeAxis = null;

    document.getElementById('lightbox').addEventListener('touchstart', e => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      swipeAxis = null;
      lbWrapEl.style.transition = 'none';
    }, { passive: true });

    document.getElementById('lightbox').addEventListener('touchmove', e => {
      const dx = e.touches[0].clientX - touchStartX;
      const dy = e.touches[0].clientY - touchStartY;
      if (!swipeAxis && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
        swipeAxis = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
      }
      if (swipeAxis === 'x') {
        lbWrapEl.style.transform = `translateX(${dx}px)`;
        lbWrapEl.style.opacity = String(Math.max(0.3, 1 - Math.abs(dx) / (window.innerWidth * 0.8)));
      } else if (swipeAxis === 'y') {
        lbWrapEl.style.transform = `translateY(${dy * 0.4}px)`;
        lbWrapEl.style.opacity = String(Math.max(0.3, 1 - Math.abs(dy) / 300));
      }
    }, { passive: true });

    document.getElementById('lightbox').addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      const threshold = window.innerWidth * 0.15;

      if (swipeAxis === 'y' && dy > 80) {
        // Swipe bas → fermer
        lbWrapEl.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
        lbWrapEl.classList.add('swipe-down');
        setTimeout(() => {
          closeLightbox();
          lbWrapEl.classList.remove('swipe-down');
          lbWrapEl.style.transition = '';
          lbWrapEl.style.transform = '';
          lbWrapEl.style.opacity = '';
        }, 200);
      } else if (swipeAxis === 'x' && Math.abs(dx) > threshold) {
        // Seuil atteint → sortie rapide puis changement
        const dir = dx < 0 ? 1 : -1;
        lbWrapEl.style.transition = 'transform 0.18s ease, opacity 0.18s ease';
        lbWrapEl.style.transform = `translateX(${dx < 0 ? '-110%' : '110%'})`;
        lbWrapEl.style.opacity = '0';
        setTimeout(() => {
          lbWrapEl.style.transition = 'none';
          lbWrapEl.style.transform = '';
          lbWrapEl.style.opacity = '';
          lightboxNav(dir);
        }, 180);
      } else {
        // Trop court → retour élastique
        lbWrapEl.style.transition = 'transform 0.2s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.2s ease';
        lbWrapEl.style.transform = '';
        lbWrapEl.style.opacity = '';
        setTimeout(() => { lbWrapEl.style.transition = ''; }, 200);
      }
    });

    // Email icon link
    (function() {
      var l2 = document.getElementById('email-link-2');
      if (l2) { l2.href = 'mailto:' + 'jeremjour.drone' + '@' + 'gmail.com'; }
    })();
  </script>
